<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover lets us use safe-area-inset-* for notch/home-indicator -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Fruit Munch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --safe-t: env(safe-area-inset-top,    0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
      --safe-r: env(safe-area-inset-right,  0px);
      --btn: 60px;   /* D-pad button size — updated by JS on resize */
      --gap: 6px;
    }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a1a;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    }

    /* ── Shell: column in portrait, row in landscape ── */
    #shell {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;                         /* dynamic viewport height — avoids mobile toolbar bug */
      padding: var(--safe-t) var(--safe-r) var(--safe-b) var(--safe-l);
    }

    /* ── HUD strip ── */
    #score-hud {
      flex: 0 0 auto;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 5px 10px;
      color: #fff;
      font-size: clamp(11px, 3.5vw, 17px);
      font-weight: bold;
      text-shadow: 0 0 8px #ff0, 0 0 2px #000;
      background: rgba(0,0,0,0.35);
      pointer-events: none;
      white-space: nowrap;
      gap: 8px;
    }

    /* ── Canvas fills the middle ── */
    #canvas-area {
      flex: 1 1 0;        /* shrink below natural size; critical pair with min-height:0 */
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }

    /* ── Controls bar below canvas ── */
    #controls-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px 12px;
    }

    /* Pause / mute button */
    #btn-pause {
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #btn-pause:active { background: rgba(255,255,255,0.25); }

    /* Power-up bar — centred between pause and d-pad */
    #powerup-bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 14px;
      pointer-events: none;
    }
    #powerup-label {
      color: #ffe066;
      font-size: clamp(10px, 3vw, 13px);
      font-weight: bold;
      text-shadow: 0 0 6px #ff0;
      text-align: center;
      display: none;
    }
    #powerup-bar-outer {
      width: 100%; max-width: 130px;
      height: 9px;
      background: rgba(255,255,255,0.15);
      border-radius: 5px;
      overflow: hidden;
      display: none;
    }
    #powerup-bar-inner {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, #ff6b35, #ffe066);
      transition: width 0.1s linear;
    }

    /* D-pad */
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, var(--btn));
      grid-template-rows:    repeat(3, var(--btn));
      gap: var(--gap);
      flex-shrink: 0;
    }

    .dpad-btn {
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.26);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(18px, 5vw, 26px);
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 70ms, transform 70ms;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(255,255,255,0.3);
      transform: scale(0.9);
    }
    .dpad-empty { visibility: hidden; }

    /* ── Landscape: flip to row, controls on right ── */
    @media (orientation: landscape) and (max-height: 480px) {
      #shell { flex-direction: row; }

      #score-hud {
        flex-direction: column;
        justify-content: center;
        width: 64px; height: 100%;
        padding: 8px 4px;
        font-size: clamp(9px, 1.8vh, 13px);
        gap: 12px;
        writing-mode: vertical-lr;   /* rotate text so it reads top-to-bottom */
      }
      /* undo vertical writing for emoji (they don't rotate well) */
      #score-hud span { writing-mode: horizontal-tb; text-align: center; }

      #canvas-area { flex: 1 1 0; min-width: 0; }

      #controls-bar {
        flex-direction: column;
        justify-content: center;
        width: 210px; height: 100%;
        padding: 12px 10px;
        gap: 12px;
      }

      #powerup-bar-wrapper { flex: 0 0 auto; padding: 0; }
      #powerup-bar-outer { max-width: 90px; }
    }
  </style>
</head>
<body>
<div id="shell">

  <div id="score-hud">
    <span id="hud-score">🍎 0</span>
    <span id="hud-high">🏆 0</span>
    <span id="hud-level">Lv 1</span>
    <span id="hud-lives">❤️❤️❤️</span>
  </div>

  <div id="canvas-area">
    <canvas id="game"></canvas>
  </div>

  <div id="controls-bar">
    <div id="btn-pause" title="Pause">⏸</div>

    <div id="powerup-bar-wrapper">
      <div id="powerup-label"></div>
      <div id="powerup-bar-outer"><div id="powerup-bar-inner"></div></div>
    </div>

    <div id="dpad">
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-up">▲</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-right">▶</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-down">▼</div>
      <div class="dpad-empty"></div>
    </div>
  </div>

</div>
<script src="game.js"></script>
</body>
</html>
